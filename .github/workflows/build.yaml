name: Compile pycdc for Windows & Linux

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: ubuntu-22.04

    steps:
      - name: Install mingw-w64
        run: |
          sudo apt update
          sudo apt install -y mingw-w64 cmake make git

      - name: Clone pycdc
        run: git clone --depth=1 https://github.com/zrax/pycdc

      - name: Build Windows (MinGW)
        run: |
          cd pycdc

          echo "RELEASE_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

          cmake -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=i686-w64-mingw32-gcc \
            -DCMAKE_CXX_COMPILER=i686-w64-mingw32-g++ \
            -DCMAKE_FIND_ROOT_PATH=/usr/i686-w64-mingw32 \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
            -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
            -DCMAKE_CXX_FLAGS="-static-libgcc -static-libstdc++" \
            .

          make -j$(nproc)

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pycdc-windows
          path: |
            pycdc/pycdc.exe
            pycdc/pycdas.exe


  build-linux-x86_64:
    runs-on: ubuntu-22.04

    steps:
      - name: Install dependencies
        run: sudo apt update && sudo apt install -y cmake make git g++

      - name: Clone pycdc
        run: git clone --depth=1 https://github.com/zrax/pycdc

      - name: Build Linux x86_64
        run: |
          cd pycdc

          cmake .
          make -j$(nproc)

          mv pycdc pycdc.x86_64
          mv pycdas pycdas.x86_64

      - name: Upload Linux x86_64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pycdc-linux-x86_64
          path: |
            pycdc/pycdc.x86_64
            pycdc/pycdas.x86_64


  build-linux-aarch64:
    runs-on: ubuntu-22.04

    steps:
      - name: Setup QEMU + ARM toolchain
        run: |
          sudo apt update
          sudo apt install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu cmake make git

      - name: Clone pycdc
        run: git clone --depth=1 https://github.com/zrax/pycdc

      - name: Build Linux ARM64
        run: |
          cd pycdc

          cmake -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            .

          make -j$(nproc)

          mv pycdc pycdc.aarch64
          mv pycdas pycdas.aarch64

      - name: Upload ARM64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pycdc-linux-aarch64
          path: |
            pycdc/pycdc.aarch64
            pycdc/pycdas.aarch64


  release:
    needs: [build-windows, build-linux-x86_64, build-linux-aarch64]
    runs-on: ubuntu-22.04

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Set release info
        run: |
          echo "RELEASE_DATE=$(date -u +%d-%b-%Y)" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          name: Decompyle++ ${{ env.RELEASE_DATE }}
          tag: build-${{ env.RELEASE_DATE }}-${{ github.sha }}
          body: "Automated build"
          artifacts: |
            dist/**/*.exe
            dist/**/*.x86_64
            dist/**/*.aarch64
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          draft: true
