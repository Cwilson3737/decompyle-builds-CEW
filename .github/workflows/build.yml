name: Compile pycdc for Windows & Linux

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git cmake make mingw-w64 g++

      - name: Clone pycdc
        run: git clone --depth=1 https://github.com/zrax/pycdc

      - name: Set commit hash
        run: |
          cd pycdc
          echo "RELEASE_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # ---------------- WINDOWS BUILD ----------------
      - name: Build Windows (MinGW)
        run: |
          cd pycdc

          cmake -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=i686-w64-mingw32-gcc \
            -DCMAKE_CXX_COMPILER=i686-w64-mingw32-g++ \
            -DCMAKE_FIND_ROOT_PATH=/usr/i686-w64-mingw32 \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
            -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
            -DCMAKE_CXX_FLAGS="-static-libgcc -static-libstdc++" \
            .

          make -j$(nproc)

          mkdir -p ../dist/windows
          cp pycdc.exe pycdas.exe ../dist/windows/

      # ---------------- LINUX BUILD ----------------
      - name: Build Linux x86_64
        run: |
          cd pycdc
          cmake .
          make -j$(nproc)

          mkdir -p ../dist/linux-x86_64
          cp pycdc pycdas ../dist/linux-x86_64/

      # ---------------- ARM BUILD (CROSS COMPILE) ----------------
      - name: Install ARM toolchain
        run: |
          sudo apt install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build Linux ARM64
        run: |
          cd pycdc
          make clean || true

          cmake -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            .

          make -j$(nproc)

          mkdir -p ../dist/linux-aarch64
          cp pycdc pycdas ../dist/linux-aarch64/

      # ---------------- RELEASE INFO ----------------
      - name: Set release metadata
        run: |
          echo "RELEASE_DATE=$(date -u +%d-%b-%Y)" >> $GITHUB_ENV
          echo "RELEASE_TIME=$(date -u +%H:%M)" >> $GITHUB_ENV

      # ---------------- UPLOAD ARTIFACTS ----------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pycdc-builds
          path: dist/

      # ---------------- CREATE RELEASE ----------------
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          name: Decompyle++ ${{ env.RELEASE_DATE }}
          tag: build-${{ env.RELEASE_DATE }}-${{ env.RELEASE_COMMIT }}
          body: |
            Automated build
            Date: ${{ env.RELEASE_DATE }} ${{ env.RELEASE_TIME }} UTC
            Commit: ${{ env.RELEASE_COMMIT }}
          artifacts: |
            dist/windows/*
            dist/linux-x86_64/*
            dist/linux-aarch64/*
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          draft: true
